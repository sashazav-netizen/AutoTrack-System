<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTrack - ניהול חריגות וזמנים</title>
    <style>
        :root {
            --primary: #2c3e50;
            --danger-bg: #ffebee;
            --danger-text: #c0392b;
            --success-text: #27ae60;
            --light-bg: #f4f7f6;
            --edit-color: #f39c12;
            --import-color: #9b59b6;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #d1d8e0;
            margin: 0;
            padding: 20px;
            font-size: 14px;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1600px; /* רחב יותר */
            height: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* מונע מהדף כולו להתגלגל */
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            margin: 0 0 15px 0; 
            font-size: 2em;
            border-bottom: 2px solid var(--light-bg);
            padding-bottom: 10px;
        }

        /* סרגלי סיכום */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 15px 30px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-total { background-color: var(--primary); }
        .stat-overdue { background-color: var(--danger-text); }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: var(--light-bg);
            padding: 10px;
            border-radius: 5px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 6px;
        }

        input, button { 
            padding: 8px 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
        }

        .search-input { width: 250px; border: 2px solid var(--primary); }

        button { color: white; cursor: pointer; font-weight: bold; border: none; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        .export-btn { background-color: #27ae60; }
        .import-label { 
            background-color: var(--import-color); 
            padding: 8px 15px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            display: inline-block; 
        }
        .add-btn { background-color: var(--primary); font-size: 1.1em; }
        .delete-btn { background-color: #e74c3c; padding: 4px 8px; }
        .edit-btn { background-color: var(--edit-color); padding: 4px 8px; }

        #fileInput { display: none; }

        /* אזור הטבלה - הגדרת גלילה פנימית */
        .table-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; position: relative; }
        
        /* כותרת טבלה קבועה בזמן גלילה */
        th { 
            position: sticky; 
            top: 0; 
            background-color: var(--primary); 
            color: white; 
            padding: 12px;
            z-index: 10;
        }

        td { padding: 12px 8px; text-align: center; border: 1px solid #eee; }

        .row-overdue { background-color: var(--danger-bg) !important; }
        .row-overdue td { color: #721c24; font-weight: 500; }

        .days-cell { font-weight: bold; font-size: 1.1em; }
        .positive { color: var(--success-text); }
        .negative { color: var(--danger-text); }

        .notes-cell { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        footer { 
            text-align: center; 
            padding: 15px 0 0 0; 
            color: #7f8c8d; 
            font-size: 12px; 
            border-top: 1px solid #eee;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 AutoTrack System</h1>

    <div class="stats-bar">
        <div class="stat-card stat-total">סה"כ רכבים<br><span id="totalCount">0</span></div>
        <div class="stat-card stat-overdue">רכבים בחריגה<br><span id="overdueCount">0</span></div>
    </div>

    <div class="header-actions">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 חפש לפי לוחית או שם בעל..." oninput="updateTable()">
        <div>
            <label for="fileInput" class="import-label">📂 ייבוא CSV</label>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            <button class="export-btn" onclick="exportToCSV()">📊 ייצוא ל-Excel</button>
        </div>
    </div>

    <div class="form-group">
        <input type="text" id="plate" placeholder="לוחית זיהוי">
        <input type="text" id="owner" placeholder="שם בעל הרכב">
        <input type="tel" id="phone" placeholder="מספר טלפון">
        <input type="text" id="address" placeholder="כתובת">
        <input type="date" id="targetDate">
        <input type="text" id="notes" placeholder="הערות / הערכת זמן">
        <button class="add-btn" onclick="addRow()">הוסף / עדכן רכב +</button>
    </div>

    <div class="table-wrapper">
        <table id="trackingTable">
            <thead>
                <tr>
                    <th>לוחית</th>
                    <th>בעל הרכב</th>
                    <th>פלאפון</th>
                    <th>כתובת</th>
                    <th>הערות</th>
                    <th>ימים לטיפול</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <footer>
        © 2026 כל הזכויות שמורות לאלכסנדר זבודיסקר | Alexander Zavodisker - הגרסה המקצועית
    </footer>
</div>

<script>
    let fleet = JSON.parse(localStorage.getItem('fleetData')) || [];

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let total = 0;
        let overdue = 0;

        fleet.forEach((item, index) => {
            const target = new Date(item.targetDate);
            target.setHours(0, 0, 0, 0);
            const diffTime = target - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const isOverdue = diffDays < 0;

            total++;
            if (isOverdue) overdue++;

            if (item.plate.includes(searchTerm) || (item.owner && item.owner.toLowerCase().includes(searchTerm))) {
                const row = document.createElement('tr');
                if (isOverdue) row.classList.add('row-overdue');

                row.innerHTML = `
                    <td><b>${item.plate}</b></td>
                    <td>${item.owner || ''}</td>
                    <td><a href="tel:${item.phone}">${item.phone || ''}</a></td>
                    <td>${item.address || ''}</td>
                    <td class="notes-cell" title="${item.notes || ''}">${item.notes || ''}</td>
                    <td class="days-cell ${isOverdue ? 'negative' : 'positive'}">${diffDays}</td>
                    <td>
                        <button class="edit-btn" onclick="editRow(${index})">✏️</button>
                        <button class="delete-btn" onclick="deleteRow(${index})">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            }
        });

        document.getElementById('totalCount').innerText = total;
        document.getElementById('overdueCount').innerText = overdue;
        localStorage.setItem('fleetData', JSON.stringify(fleet));
    }

    function addRow() {
        const data = {
            plate: document.getElementById('plate').value.trim(),
            owner: document.getElementById('owner').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            targetDate: document.getElementById('targetDate').value,
            notes: document.getElementById('notes').value
        };

        if (!data.plate || !data.targetDate) return alert("חובה להזין לוחית ותאריך יעד");

        const existingIndex = fleet.findIndex(item => item.plate === data.plate);
        if (existingIndex !== -1) {
            if (confirm("הרכב כבר קיים. האם לעדכן פרטים?")) {
                fleet[existingIndex] = data;
            } else { return; }
        } else {
            fleet.push(data);
        }

        updateTable();
        document.querySelectorAll('.form-group input').forEach(i => i.value = '');
    }

    function editRow(index) {
        const item = fleet[index];
        document.getElementById('plate').value = item.plate;
        document.getElementById('owner').value = item.owner;
        document.getElementById('phone').value = item.phone;
        document.getElementById('address').value = item.address;
        document.getElementById('targetDate').value = item.targetDate;
        document.getElementById('notes').value = item.notes;
        fleet.splice(index, 1);
        updateTable();
    }

    function deleteRow(index) {
        if(confirm("למחוק רשומה זו?")) { fleet.splice(index, 1); updateTable(); }
    }

    function exportToCSV() {
        if (fleet.length === 0) return alert("אין נתונים לייצוא");
        let csv = "\uFEFFלוחית,בעל הרכב,פלאפון,כתובת,הערות,תאריך יעד\n";
        fleet.forEach(i => {
            csv += `"${i.plate}","${i.owner}","${i.phone}","${i.address}","${i.notes}","${i.targetDate}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = 'AutoTrack_Database.csv';
        link.click();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split('\n');
            let updated = 0, added = 0;
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const c = cols.map(v => v.replace(/"/g, ''));
                if (c.length >= 2) {
                    const newItem = { plate: c[0].trim(), owner: c[1], phone: c[2], address: c[3], notes: c[4], targetDate: c[5] };
                    const idx = fleet.findIndex(item => item.plate === newItem.plate);
                    if (idx !== -1) { fleet[idx] = newItem; updated++; }
                    else { fleet.push(newItem); added++; }
                }
            }
            alert(`ייבוא הצליח! נוספו ${added}, עודכנו ${updated}`);
            updateTable();
        };
        reader.readAsText(file);
    }

    updateTable();
</script>

</body>
</html>
